<!DOCTYPE html>
<html lang="ko">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하주초 연수 이수증 수합</title>
    <!-- Tailwind CSS (Fixed version for production stability) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: {
                            50: '#f5f7ff',
                            100: '#ebf0fe',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --secondary: #64748B;
            --accent: #F43F5E;
            --bg-glass: rgba(255, 255, 255, 0.7);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background: radial-gradient(circle at top right, #EEF2FF 0%, #E0E7FF 50%, #F5F3FF 100%);
            min-height: 100vh;
            color: #1E293B;
            -webkit-font-smoothing: antialiased;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            filter: grayscale(1);
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .loading-shimmer {
            background: linear-gradient(90deg, transparent 25%, rgba(99, 102, 241, 0.05) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
    </style>
</head>

<body class="p-4 md:p-8 flex items-center justify-center">
    <div id="app"
        class="w-full max-w-4xl glass rounded-3xl overflow-hidden min-h-[700px] flex flex-col animate-slide-up">

        <header class="bg-indigo-600 p-8 text-white relative">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-16 -mt-16 blur-2xl"></div>
            <h1 class="text-3xl font-extrabold tracking-tight">🏫 하주초 연수 이수증 수합</h1>
        </header>

        <nav class="flex border-b bg-white/50 backdrop-blur-md">
            <button onclick="showView('home')" class="flex-1 py-5 text-center font-bold transition-all relative"
                id="tab-home">
                <span class="relative z-10">연수 목록</span>
                <div id="tab-indicator-home"
                    class="absolute bottom-0 left-0 w-full h-1 bg-indigo-600 scale-x-0 transition-transform origin-left">
                </div>
            </button>
            <button onclick="showView('admin')"
                class="flex-1 py-5 text-center font-bold transition-all relative text-gray-400" id="tab-admin">
                <span class="relative z-10">시스템 관리</span>
                <div id="tab-indicator-admin"
                    class="absolute bottom-0 left-0 w-full h-1 bg-indigo-600 scale-x-0 transition-transform origin-left">
                </div>
            </button>
        </nav>

        <main class="flex-1 overflow-y-auto p-6 md:p-10">
            <!-- Home -->
            <div id="view-home" class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-gray-800 tracking-tight">📋 현재 진행 중인 수합</h2>
                    <button onclick="refreshLists()"
                        class="p-2 hover:bg-gray-100 rounded-full transition text-gray-500">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                            </path>
                        </svg>
                    </button>
                </div>
                <div id="training-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="col-span-full py-20 text-center space-y-4">
                        <div class="loading-shimmer h-12 w-full rounded-2xl mx-auto max-w-md"></div>
                        <p class="text-gray-400 font-medium">연수 정보를 불러오는 중입니다...</p>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <div id="view-submit" class="hidden space-y-8 max-w-2xl mx-auto">
                <button onclick="showView('home')"
                    class="group text-sm font-bold text-indigo-600 flex items-center hover:text-indigo-800 transition">
                    <svg class="w-5 h-5 mr-2 group-hover:-translate-x-1 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                    돌아가기
                </button>
                <div class="text-center">
                    <h2 id="submit-title" class="text-3xl font-extrabold text-gray-900 mb-2">이수증 분석</h2>
                    <p class="text-gray-500">파일을 업로드하면 AI가 정보를 자동으로 찾아줍니다.</p>
                </div>
                <div id="upload-step"
                    class="border-4 border-dashed border-gray-200 rounded-3xl p-12 text-center transition-all hover:border-indigo-300 hover:bg-indigo-50/50 group">
                    <input type="file" id="form-file" accept=".pdf,image/*" multiple class="hidden" onchange="startAnalysis()">
                    <label for="form-file" class="cursor-pointer block">
                        <div
                            class="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                            <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12">
                                </path>
                            </svg>
                        </div>
                        <p class="text-lg font-bold text-gray-700">이수증 파일(PDF/이미지) 선택</p>
                        <p class="text-sm text-gray-400 mt-2">파일을 클릭하거나 드래그하여 업로드하세요</p>
                    </label>
                </div>
                <div id="analysis-loading" class="hidden text-center py-10 space-y-6">
                    <div class="flex justify-center flex-col items-center gap-4">
                        <div
                            class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin">
                        </div>
                        <div class="text-xl font-bold text-gray-800">업로드 및 분석 중...</div>
                        <p class="text-gray-500 animate-pulse">이수증의 내용을 파악하고 데이터를 추출하고 있습니다.</p>
                    </div>
                </div>
                <div id="confirm-step" class="hidden space-y-6 animate-slide-up">
                    <!-- Review List Area -->
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-gray-700">이수증 목록 (<span id="queue-count">0</span>)</h3>
                        <button onclick="document.getElementById('form-file').click()" 
                            class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-xl hover:bg-indigo-100 transition flex items-center">
                            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            파일 추가
                        </button>
                    </div>
                    <div id="review-list-container" class="space-y-4 max-h-[400px] overflow-y-auto p-2 scroll-smooth"></div>
                    
                    </div>
                    <div id="review-list-container" class="space-y-6 max-h-[600px] overflow-y-auto p-4 scroll-smooth"></div>

                    <div class="flex flex-col gap-3">
                        <button onclick="finalBulkSubmit()" id="final-submit-btn"
                            class="w-full py-4 btn-primary text-white rounded-2xl font-bold text-lg min-h-[64px] shadow-lg">확인된 항목 일괄 제출하기</button>
                        <button onclick="resetUpload()" class="text-sm font-bold text-gray-400 hover:text-gray-600 transition">모두 취소하고 다시 올리기</button>
                    </div>
                </div>
            </div>

            <!-- Admin -->
            <div id="view-admin" class="hidden space-y-10 animate-slide-up">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold text-gray-800">⚙️ 시스템 관리</h2>
                </div>
                <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm space-y-6">
                    <h3 class="text-xl font-bold text-gray-800">📝 새 연수 수합 등록</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div><label class="block text-sm font-bold text-gray-600 mb-2">연수 명칭</label><input type="text"
                                id="admin-title" placeholder="예: 2026 에듀테크 역량 강화"
                                class="w-full p-3 rounded-xl input-field"></div>
                        <div><label class="block text-sm font-bold text-gray-600 mb-2">마감 일자</label><input type="date"
                                id="admin-deadline" class="w-full p-3 rounded-xl input-field"></div>
                        <div class="col-span-full">
                            <label class="block text-sm font-bold text-gray-600 mb-2">안내사항</label>
                            <textarea id="admin-notice" rows="3" placeholder="예: 이수증 파일명을 '성명_연수명'으로 저장하여 제출해 주세요."
                                class="w-full p-3 rounded-xl input-field"></textarea>
                        </div>
                    </div>
                    <button onclick="registerTraining(event)"
                        class="w-full py-4 btn-primary text-white rounded-xl font-bold min-h-[60px]">연수 시트 생성</button>
                </div>

                <div class="bg-white rounded-3xl p-8 border border-gray-100 shadow-sm space-y-6">
                    <h3 class="text-xl font-bold text-gray-800">📊 생성된 연수 관리</h3>
                    <div id="admin-training-list" class="space-y-3">
                        <p class="text-center text-gray-400 py-10">연수 목록을 불러오는 중...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->

    <div id="duplicateModal"
        class="fixed inset-0 bg-black/60 flex items-center justify-center hidden z-[100] backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden animate-slide-up">
            <div class="bg-indigo-600 p-6 text-white text-center">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                </div>
                <h3 class="text-xl font-bold">동명이인 확인</h3>
                <p class="text-indigo-100 text-sm opacity-90">누구의 이수증인지 선택해 주세요.</p>
            </div>
            <div id="duplicate-list" class="p-6 space-y-3 max-h-80 overflow-y-auto"></div>
            <div class="p-6 bg-gray-50 flex gap-3">
                <button onclick="closeModal('duplicateModal')"
                    class="flex-1 py-3 text-gray-500 font-bold hover:bg-gray-100 rounded-xl transition">취소</button>
            </div>
        </div>
    <div id="alertModal"
        class="fixed inset-0 bg-black/60 flex items-center justify-center hidden z-[110] backdrop-blur-sm p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center space-y-6 animate-slide-up">
            <div id="modal-icon"
                class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto text-3xl">
                ✅
            </div>
            <div id="modal-message" class="text-xl font-bold text-gray-800 break-words font-['Noto_Sans_KR']"></div>
            <button onclick="closeModal('alertModal')"
                class="w-full py-4 btn-primary text-white rounded-2xl font-bold shadow-lg">확인</button>
        </div>
    </div>

    <script>
        /**
         * 🏆 GAS Environment Bridge & Mocking System
         */
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw2ZPdM4drIP7hy_Hhup28i8a5PyrdbiyZAH4V9m3Z0PFbBzfK3borTYgDaYzv2YDTC/exec"; //여기에 GAS 배포 URL을 입력하세요.

        async function callGas(functionName, ...args) {
            // 1. Mock Mode (Local Preview)
            if (!GAS_URL && typeof google === 'undefined') {
                const mockHandlers = {
                    getTrainingList: () => [{ title: "2026 에듀테크 연수 (Mock)", deadlineStr: "2026-12-31", sheetUrl: "#", folderUrl: "#" }],
                    analyzeCertificate: () => ({ name: "홍길동", courseName: "에듀테크 활용", certNo: "123", hours: "15", institution: "하주초등학교" }),
                    addTraining: (t, d, n) => `[${t}] 등록 완료 (안내사항: ${n})`,
                    submitCertificate: (d) => `${d.name} 님 제출 완료`
                };
                return new Promise(res => setTimeout(() => res(mockHandlers[functionName] ? mockHandlers[functionName](...args) : null), 800));
            }

            // 2. Vercel Mode (External API)
            if (GAS_URL) {
                // 'text/plain'을 사용하여 브라우저의 CORS preflight(OPTIONS)를 방지합니다.
                // GAS doPost는 컨텐츠 타입과 관계없이 e.postData.contents로 데이터를 읽을 수 있습니다.
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ functionName, args })
                });
                const json = await res.json();
                if (json.status === 'success') return json.data;
                throw new Error(json.message || "알 수 없는 오류가 발생했습니다.");
            }

            // 3. GAS Mode (Standard)
            return new Promise((resolve, reject) => {
                google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[functionName](...args);
            });
        }

        // --- 전역 변수 ---
        let cachedList = [];
        let currentTrainingTitle = "";
        let participantCache = [];
        let uploadQueue = []; // { file, id, status, aiData, matches, selectedMatchIndex, base64 }
        let currentEditId = null;

        document.addEventListener('DOMContentLoaded', () => {
            refreshLists();
            showView('home');
            initDragAndDrop();
        });

        function initDragAndDrop() {
            const dropZone = document.getElementById('view-submit'); // 스코프 확장
            const dashZone = document.getElementById('upload-step');
            if (!dropZone) return;

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    if (dashZone && !dashZone.classList.contains('hidden')) {
                        dashZone.classList.add('border-indigo-500', 'bg-indigo-50/80');
                    }
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    if (dashZone) dashZone.classList.remove('border-indigo-500', 'bg-indigo-50/80');
                }, false);
            });

            dropZone.addEventListener('drop', e => {
                const dt = e.dataTransfer;
                if (dt.files.length) {
                    processFiles(dt.files);
                }
            }, false);
        }

        function showView(view) {
            ['home', 'submit', 'admin'].forEach(v => document.getElementById('view-' + v).classList.add('hidden'));
            document.getElementById('view-' + view).classList.remove('hidden');

            const isHome = view !== 'admin';
            document.getElementById('tab-home').classList.toggle('text-indigo-600', isHome);
            document.getElementById('tab-indicator-home').classList.toggle('scale-x-100', isHome);
            document.getElementById('tab-admin').classList.toggle('text-indigo-600', !isHome);
            document.getElementById('tab-indicator-admin').classList.toggle('scale-x-100', !isHome);
        }

        async function refreshLists() {
            const container = document.getElementById('training-list');
            container.innerHTML = '<div class="col-span-full py-20 text-center"><div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p class="text-gray-400">목록을 갱신하는 중...</p></div>';
            
            try {
                cachedList = await callGas('getTrainingList');
                renderHome();
                renderAdmin();
            } catch (e) { 
                container.innerHTML = `<div class="col-span-full py-20 text-center text-red-500 font-bold">에러: ${e.message || e}</div>`;
                showAlert("데이터를 불러오지 못했습니다: " + e, true); 
            }
        }

        function renderHome() {
            const container = document.getElementById('training-list');
            if (!cachedList.length) { container.innerHTML = '<div class="col-span-full py-20 text-center text-gray-400">등록된 연수가 없습니다.</div>'; return; }
            container.innerHTML = cachedList.map(item => `
                <div onclick="openSubmit('${item.title}')" class="group bg-white p-6 rounded-3xl cursor-pointer transition-all hover:shadow-xl border border-transparent hover:border-indigo-100">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-bold text-xl">${item.title[0]}</div>
                        <span class="text-xs font-bold px-3 py-1 bg-red-50 text-red-500 rounded-full">D-Day: ${item.deadlineStr}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2 truncate">${item.title}</h3>
                </div>
            `).join('');
        }

        function renderAdmin() {
            const container = document.getElementById('admin-training-list');
            if (!container) return;
            if (!cachedList.length) { container.innerHTML = '<div class="py-10 text-center text-gray-400">생성된 연수가 없습니다.</div>'; return; }
            
            container.innerHTML = cachedList.map(item => `
                <div class="bg-gray-50 p-5 rounded-2xl flex items-center justify-between border border-gray-100 hover:border-indigo-100 transition-colors">
                    <div>
                        <p class="font-bold text-gray-800">${item.title}</p>
                        <p class="text-xs text-gray-400 mt-1">마감: ${item.deadlineStr}</p>
                    </div>
                    <div class="flex gap-2">
                        <a href="${item.sheetUrl}" target="_blank" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-xs font-bold text-indigo-600 hover:bg-indigo-50 transition-all flex items-center gap-1">
                            시트
                        </a>
                        <a href="${item.folderUrl}" target="_blank" class="px-4 py-2 bg-white border border-gray-200 rounded-xl text-xs font-bold text-indigo-600 hover:bg-indigo-50 transition-all flex items-center gap-1">
                            폴더
                        </a>
                    </div>
                </div>
            `).join('');
        }

        async function openSubmit(title) {
            currentTrainingTitle = title;
            document.getElementById('submit-title').innerText = title;
            document.getElementById('upload-step').classList.remove('hidden');
            document.getElementById('confirm-step').classList.add('hidden');
            resetUpload();
            showView('submit');

            // 빠른 중복 체크를 위한 명단 캐싱
            try {
                participantCache = await callGas('getParticipantList', title);
            } catch (e) { console.error("명단 로드 실패:", e); }
        }

        function resetUpload() {
            uploadQueue = [];
            currentEditId = null;
            document.getElementById('form-file').value = "";
            document.getElementById('review-list-container').innerHTML = "";
            document.getElementById('upload-step').classList.remove('hidden');
            document.getElementById('confirm-step').classList.add('hidden');
        }

        function processFiles(files) {
            const fileList = Array.from(files);
            if (!fileList.length) return;

            document.getElementById('upload-step').classList.add('hidden');
            document.getElementById('confirm-step').classList.remove('hidden');

            const startIdx = uploadQueue.length;
            fileList.forEach((file, i) => {
                uploadQueue.push({
                    file: file,
                    id: startIdx + i,
                    status: 'pending',
                    aiData: null,
                    matches: [],
                    selectedMatchIndex: -1,
                    base64: null,
                    error: null
                });
            });

            renderReviewQueue();
            processQueueSequentially();
        }

        function startAnalysis() {
            const fileInput = document.getElementById('form-file');
            processFiles(fileInput.files);
        }

        async function processQueueSequentially() {
            for (let item of uploadQueue) {
                if (item.status !== 'pending') continue;

                item.status = 'analyzing';
                renderReviewQueue();

                try {
                    const base64 = await readFileAsDataURL(item.file);
                    item.base64 = base64;
                    const res = await callGas('analyzeCertificate', base64, item.file.name);
                    item.aiData = res;
                    
                    // 빠른 자동 매칭
                    const matches = participantCache.filter(p => p.name === res.name);
                    item.matches = matches;
                    
                    if (matches.length === 1) {
                        item.selectedMatchIndex = 0;
                        item.status = 'ready';
                    } else if (matches.length > 1) {
                        item.status = 'multiple';
                    } else {
                        item.status = 'not_found';
                    }
                } catch (err) {
                    item.status = 'error';
                    item.error = err.message || err;
                }
                renderReviewQueue();
            }
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject("파일 읽기 실패");
                reader.readAsDataURL(file);
            });
        }

        function renderReviewQueue() {
            const container = document.getElementById('review-list-container');
            document.getElementById('queue-count').innerText = uploadQueue.length;
            
            container.innerHTML = uploadQueue.map(item => {
                let statusBadge = '';
                let borderClass = 'border-gray-100';
                let icon = '📄';

                if (item.status === 'analyzing') {
                    statusBadge = '<span class="text-indigo-500 animate-pulse font-bold">AI 분석 중...</span>';
                    icon = '<div class="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>';
                } else if (item.status === 'ready') {
                    statusBadge = '<span class="text-green-600 font-bold">✅ 준비 완료</span>';
                    borderClass = 'border-green-200 bg-green-50/30';
                } else if (item.status === 'multiple') {
                    statusBadge = '<span class="text-orange-500 font-bold">⚠️ 동명 발견 (선택 필요)</span>';
                    borderClass = 'border-orange-200 bg-orange-50/30';
                } else if (item.status === 'not_found') {
                    statusBadge = '<span class="text-red-400 font-bold">❓ 명단에 없음</span>';
                    borderClass = 'border-red-100 bg-red-50/30';
                } else if (item.status === 'error') {
                    statusBadge = `<span class="text-red-600 font-bold">❌ 오류: ${item.error}</span>`;
                    borderClass = 'border-red-200 bg-red-100/50';
                } else if (item.status === 'submitted') {
                    statusBadge = '<span class="text-indigo-600 font-bold">🎉 제출 완료</span>';
                    borderClass = 'border-indigo-100 bg-indigo-50/30';
                }

                const detailContent = item.aiData ? `
                    <div class="mt-4 pt-4 border-t border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-3">
                        <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-0.5">성명</label>
                            <input type="text" value="${item.aiData.name}" oninput="updateQueueItem(${item.id}, 'name', this.value)" class="w-full p-2 rounded-lg bg-gray-50 border border-gray-100 focus:bg-white focus:border-indigo-400 outline-none text-sm font-bold">
                        </div>
                        <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-0.5">과정명</label>
                            <input type="text" value="${item.aiData.courseName}" oninput="updateQueueItem(${item.id}, 'courseName', this.value)" class="w-full p-2 rounded-lg bg-gray-50 border border-gray-100 focus:bg-white focus:border-indigo-400 outline-none text-sm font-bold">
                        </div>
                        <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-0.5">이수번호</label>
                            <input type="text" value="${item.aiData.certNo}" oninput="updateQueueItem(${item.id}, 'certNo', this.value)" class="w-full p-2 rounded-lg bg-gray-50 border border-gray-100 focus:bg-white focus:border-indigo-400 outline-none text-sm font-bold">
                        </div>
                        <div><label class="block text-[10px] font-bold text-gray-400 uppercase mb-0.5">이수시간</label>
                            <input type="text" value="${item.aiData.hours}" oninput="updateQueueItem(${item.id}, 'hours', this.value)" class="w-full p-2 rounded-lg bg-gray-50 border border-gray-100 focus:bg-white focus:border-indigo-400 outline-none text-sm font-bold">
                        </div>
                        <div class="col-span-full"><label class="block text-[10px] font-bold text-gray-400 uppercase mb-0.5">근무기관</label>
                            <input type="text" value="${item.aiData.institution}" oninput="updateQueueItem(${item.id}, 'institution', this.value)" class="w-full p-2 rounded-lg bg-gray-50 border border-gray-100 focus:bg-white focus:border-indigo-400 outline-none text-sm font-bold">
                        </div>
                    </div>
                ` : '';

                return `
                    <div class="p-5 bg-white border-2 ${borderClass} rounded-3xl transition-all shadow-sm flex flex-col gap-1">
                        <div class="flex items-center gap-4">
                            <div class="flex-shrink-0 w-10 h-10 bg-gray-50 rounded-2xl flex items-center justify-center">${icon}</div>
                            <div class="flex-grow min-w-0">
                                <p class="text-[10px] text-gray-400 truncate">${item.file.name}</p>
                                <p class="font-bold text-gray-800">${item.aiData ? item.aiData.name : '대기 중...'}</p>
                            </div>
                            <div class="flex-shrink-0 text-right text-xs">${statusBadge}</div>
                        </div>
                        ${detailContent}
                    </div>
                `;
            }).join('');
        }

        function updateQueueItem(id, field, value) {
            const item = uploadQueue.find(i => i.id === id);
            if (!item || !item.aiData) return;

            item.aiData[field] = value;

            // 재매칭 (빠른 체크)
            const matches = participantCache.filter(p => p.name === item.aiData.name);
            item.matches = matches;
            
            const oldStatus = item.status;
            if (matches.length === 1) {
                item.selectedMatchIndex = 0;
                item.status = 'ready';
            } else if (matches.length > 1) {
                item.status = 'multiple';
                item.selectedMatchIndex = -1;
            } else {
                item.status = 'not_found';
                item.selectedMatchIndex = -1;
            }
            
            // 상태가 변한 경우에만 전체 리렌더링 (입력 중 커서 튐 방지)
            if (oldStatus !== item.status) {
                renderReviewQueue();
            } else {
                // 상태 배지만 업데이트
                document.getElementById('queue-count').innerText = uploadQueue.length;
                // 실제로는 전체 리렌더링 시 input focus를 잃으므로 
                // 위에서 oldStatus 체크를 통해 입력 중에는 렌더링을 피함
            }
        }

        async function finalBulkSubmit() {
            const readyItems = uploadQueue.filter(i => i.status === 'ready');
            if (!readyItems.length) return showAlert("제출 가능한(준비 완료) 항목이 없습니다.", true);

            const btn = document.getElementById('final-submit-btn');
            const originalText = btn.innerText;
            btn.disabled = true;

            let successCount = 0;
            for (let i = 0; i < readyItems.length; i++) {
                const item = readyItems[i];
                btn.innerHTML = `<span class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> (${i + 1}/${readyItems.length}) 제출 중...</span>`;
                
                const match = item.matches[item.selectedMatchIndex];
                const data = {
                    trainingTitle: currentTrainingTitle,
                    name: item.aiData.name,
                    courseName: item.aiData.courseName,
                    certNo: item.aiData.certNo,
                    hours: item.aiData.hours,
                    institution: item.aiData.institution,
                    fileData: item.base64,
                    fileName: item.file.name,
                    rowIndex: match.rowIndex
                };

                try {
                    await callGas('submitCertificate', data);
                    item.status = 'submitted';
                    successCount++;
                } catch (err) {
                    item.status = 'error';
                    item.error = "제출 실패: " + err;
                }
                renderReviewQueue();
            }

            btn.disabled = false;
            btn.innerText = originalText;
            showAlert(`${successCount}개의 이수증이 성공적으로 등록되었습니다.`);
            
            if (successCount === readyItems.length) {
                // 모두 성공 시 홈으로
                setTimeout(() => showView('home'), 1500);
            }
        }

        async function registerTraining() {
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            const title = document.getElementById('admin-title').value;
            const deadline = document.getElementById('admin-deadline').value;
            const notice = document.getElementById('admin-notice').value;
            if (!title) return showAlert("제목을 입력하세요.", true);
            
            btn.disabled = true;
            btn.innerHTML = `<span class="flex items-center justify-center gap-2"><div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> 생성 중...</span>`;
            
            try {
                const msg = await callGas('addTraining', title, deadline, notice);
                showAlert(msg);
                document.getElementById('admin-title').value = "";
                document.getElementById('admin-notice').value = "";
                refreshLists();
            } catch (e) { showAlert(e, true); }
            finally { btn.disabled = false; btn.innerText = originalText; }
        }

        function showAlert(msg, isError = false) {
            const modal = document.getElementById('alertModal');
            if (!modal) return alert(msg);
            const icon = document.getElementById('modal-icon');
            const message = document.getElementById('modal-message');
            message.innerText = msg;
            icon.className = `w-20 h-20 rounded-full flex items-center justify-center mx-auto ${isError ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`;
            icon.innerHTML = isError ? '❌' : '✅';
            modal.classList.remove('hidden');
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>

</html>
